# Security Template — Pre-commit Hook Configuration
# Version: 1.2.1

exclude: '\.semgrep/rules/community/|\.claude/skills/[^/]+/rules/.+\.md$|\.env\.example$|\.backup-|tests/ci/'

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: "Gitleaks — detect hardcoded secrets"

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: "detect-secrets — secrets baseline check"
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json|yarn.lock|.*\.min\.js

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: "Bandit — Python security linter"
        args: ['-ll', '-c', 'pyproject.toml']
        additional_dependencies: ["bandit[toml]"]
        files: \.py$

  - repo: https://github.com/semgrep/semgrep
    rev: v1.163.0
    hooks:
      - id: semgrep
        name: "Semgrep — security pattern scan"
        args:
          - '--config=.semgrep/rules/security.yml'
          - '--error'
          - '--severity=ERROR'
          - '--severity=WARNING'
          - '--metrics=off'
          - '--timeout=10'

  - repo: local
    hooks:
      - id: pip-audit
        name: "pip-audit — Python dependency CVE scan"
        language: python
        additional_dependencies: ["pip-audit==2.7.3"]
        entry: bash
        # Scan từng file requirements khớp pattern — không hardcode tên file
        args: ["-c", "for f in \"$@\"; do pip-audit -r \"$f\" || exit 1; done", "--"]
        pass_filenames: true
        files: requirements.*\.txt$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: detect-private-key
        name: "Check for committed private keys"
      - id: trailing-whitespace
      - id: end-of-file-fixer
