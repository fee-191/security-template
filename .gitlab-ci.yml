# Security Template — GitLab CI Pipeline
# Version: 1.2.1
#
# ┌──────────────────────────────────────────────────────────────────────┐
# │  Tích hợp vào project của bạn — thêm vào .gitlab-ci.yml:            │
# │                                                                      │
# │  include:                                                            │
# │    - project: 'your-gitlab-group/security-template'                  │
# │      ref: 'v1.2.1'                                                   │
# │      file: '.gitlab-ci.yml'                                          │
# │                                                                      │
# │  Biến tuỳ chỉnh (GitLab → Settings → CI/CD → Variables):            │
# │    SECURITY_SUBMODULE  — tên folder submodule (default: security)    │
# │    SLACK_WEBHOOK_URL   — webhook Slack #security (tùy chọn)        │
# └──────────────────────────────────────────────────────────────────────┘
#
# Policy:
#   CRITICAL (Gitleaks, Semgrep ERROR) → block MR + Slack alert tới #security
#   HIGH     (Semgrep WARNING, Bandit, pip-audit) → warn only, MR vẫn merge được
#
# Trigger: Merge Request only — không chạy khi push feature branch

stages:
  - security-scan
  - security-notify

# ─── 1. Secret scan — Gitleaks ────────────────────────────────────────────────
security:gitleaks:
  stage: security-scan
  image:
    name: zricethezav/gitleaks:v8.18.4
    entrypoint: [""]
  variables:
    GIT_SUBMODULE_STRATEGY: "recursive"
    SECURITY_SUBMODULE: "security"
  script:
    - echo "🔑 Scanning for hardcoded secrets..."
    - |
      if [ ! -f ".gitleaks.toml" ] && [ -f "${SECURITY_SUBMODULE}/.gitleaks.toml" ]; then
        cp "${SECURITY_SUBMODULE}/.gitleaks.toml" .gitleaks.toml
        echo "→ Using .gitleaks.toml from submodule"
      fi
    - gitleaks detect --source . --no-git --exit-code 1
  allow_failure: false
  timeout: 5 minutes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── 2. Semgrep — CRITICAL findings (block MR) ────────────────────────────────
security:semgrep-critical:
  stage: security-scan
  image:
    name: semgrep/semgrep:1.163.0
    entrypoint: [""]
  variables:
    GIT_SUBMODULE_STRATEGY: "recursive"
    SECURITY_SUBMODULE: "security"
  script:
    - echo "🔴 Scanning CRITICAL findings (will block MR)..."
    - |
      semgrep \
        --config=${SECURITY_SUBMODULE}/.semgrep/rules/security.yml \
        --severity=ERROR \
        --error \
        --metrics=off \
        --timeout=10 \
        --exclude=node_modules \
        --exclude=.venv \
        --exclude=venv \
        --exclude=__pycache__ \
        .
  allow_failure: false
  timeout: 10 minutes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── 3. Semgrep — HIGH findings (warn only) ───────────────────────────────────
security:semgrep-high:
  stage: security-scan
  image:
    name: semgrep/semgrep:1.163.0
    entrypoint: [""]
  variables:
    GIT_SUBMODULE_STRATEGY: "recursive"
    SECURITY_SUBMODULE: "security"
  script:
    - echo "🟡 Scanning HIGH findings (warning only)..."
    - |
      semgrep \
        --config=${SECURITY_SUBMODULE}/.semgrep/rules/security.yml \
        --severity=WARNING \
        --metrics=off \
        --timeout=10 \
        --exclude=node_modules \
        --exclude=.venv \
        --exclude=venv \
        --exclude=__pycache__ \
        . || true
  allow_failure: true
  timeout: 10 minutes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── 4. Bandit — Python SAST (warn only) ──────────────────────────────────────
security:bandit:
  stage: security-scan
  image: python:3.12-slim
  variables:
    GIT_SUBMODULE_STRATEGY: "none"
  script:
    - echo "🐍 Running Bandit Python security scan..."
    - pip install "bandit[toml]" -q
    - bandit -r . -ll -c pyproject.toml || true
  allow_failure: true
  timeout: 5 minutes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      exists:
        - "**/*.py"

# ─── 5. pip-audit — Dependency CVE scan (warn only) ───────────────────────────
security:pip-audit:
  stage: security-scan
  image: python:3.12-slim
  variables:
    GIT_SUBMODULE_STRATEGY: "none"
    SECURITY_SUBMODULE: "security"
  script:
    - echo "📦 Scanning Python dependencies for CVEs..."
    - pip install pip-audit -q
    - |
      FOUND=0
      for req in $(find . -maxdepth 2 -name "requirements*.txt" \
                    -not -path "./${SECURITY_SUBMODULE}/*" \
                    -not -path "./.git/*" 2>/dev/null | sort); do
        echo "→ Auditing $req..."
        pip-audit -r "$req" || true
        FOUND=1
      done
      if [ "$FOUND" -eq 0 ] && [ -f "pyproject.toml" ]; then
        echo "→ Auditing pyproject.toml..."
        pip install . -q 2>/dev/null || true
        pip-audit || true
      fi
  allow_failure: true
  timeout: 10 minutes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      exists:
        - "requirements*.txt"
        - "pyproject.toml"
        - "Pipfile.lock"

# ─── 6. Slack alert — CRITICAL only, gửi tới #security ───────────────────────
# Chỉ chạy khi pipeline fail (tức là Gitleaks hoặc Semgrep CRITICAL đã fail)
# Yêu cầu: SLACK_WEBHOOK_URL đặt trong GitLab → Settings → CI/CD → Variables
security:slack-alert:
  stage: security-notify
  image: alpine:latest
  variables:
    GIT_SUBMODULE_STRATEGY: "none"
  script:
    - apk add --no-cache curl jq -q
    - |
      payload=$(jq -n \
        --arg project  "$CI_PROJECT_NAME" \
        --arg author   "${CI_MERGE_REQUEST_AUTHOR:-unknown}" \
        --arg mr_url   "$CI_MERGE_REQUEST_PROJECT_URL/-/merge_requests/$CI_MERGE_REQUEST_IID" \
        --arg mr_ref   "!$CI_MERGE_REQUEST_IID — ${CI_MERGE_REQUEST_TITLE:-MR}" \
        --arg pipe_url "$CI_PIPELINE_URL" \
        '{
          blocks: [
            {
              type: "header",
              text: { type: "plain_text", text: "🚨 CRITICAL Security Finding — MR bị block" }
            },
            {
              type: "section",
              fields: [
                { type: "mrkdwn", text: ("*Project:*\n`" + $project + "`") },
                { type: "mrkdwn", text: ("*Author:*\n" + $author) }
              ]
            },
            {
              type: "section",
              text: { type: "mrkdwn", text: ("*MR:* <" + $mr_url + "|" + $mr_ref + ">") }
            },
            {
              type: "actions",
              elements: [{
                type: "button",
                text: { type: "plain_text", text: "Xem Pipeline →" },
                url: $pipe_url,
                style: "danger"
              }]
            },
            {
              type: "context",
              elements: [{ type: "mrkdwn", text: "Security Template v1.2.1 · Gitleaks hoặc Semgrep CRITICAL đã phát hiện lỗi" }]
            }
          ]
        }')
      curl -s -X POST "$SLACK_WEBHOOK_URL" \
        -H "Content-Type: application/json" \
        -d "$payload" | grep -v "^ok$" || true
      echo "✅ Slack alert sent to #security"
  allow_failure: true   # Nếu webhook chưa setup thì không block pipeline
  when: on_failure      # Chỉ chạy khi stage security-scan có job fail
  timeout: 2 minutes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $SLACK_WEBHOOK_URL'
